services:
  memgraph:
    image: memgraph/memgraph-platform:latest
    container_name: finance-mcp-memgraph
    ports:
      - "7687:7687"   # Bolt (neo4j-compatible driver)
      - "7444:7444"   # Memgraph Lab UI
    volumes:
      - memgraph_data:/var/lib/memgraph
    restart: unless-stopped

volumes:
  memgraph_data:
