services:
  memgraph:
    image: memgraph/memgraph:latest
    container_name: finance-mcp-memgraph
    ports:
      - "7687:7687"   # Bolt (neo4j-compatible driver)
    volumes:
      - memgraph_data:/var/lib/memgraph
    command: ["--log-level=WARNING"]
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --no-history 2>/dev/null | grep -q '1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  memgraph_data:
