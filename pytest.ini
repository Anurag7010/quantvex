[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
pythonpath =
    .
    src
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: marks tests that require a live NebulaGraph instance
    live: marks tests that require a live external API (deselect with -m 'not live')
