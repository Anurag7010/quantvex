services:
  redis:
    image: redis:7-alpine
    container_name: finance-mcp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - finance-mcp-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: finance-mcp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: [ "CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - finance-mcp-net

  mcp-server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: finance-mcp-server
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - NEBULA_HOST=finance-mcp-nebula-graphd
      - NEBULA_PORT=9669
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - finance-mcp-net
      - nebula-net
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:

networks:
  finance-mcp-net:
  nebula-net:
    driver: bridge
